- name: Build Unsigned IPA
        run: |
          # The -destination is the key fix for Error 70
          xcodebuild archive \
            -workspace Trio.xcworkspace \
            -scheme Trio \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Trio.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_METHOD=manual

          # Create the IPA structure manually
          mkdir -p build/Payload
          cp -r build/Trio.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r Trio.ipa Payload/

      - name: Upload Build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Trio-IPA-Unsigned
          path: build/Trio.ipa
