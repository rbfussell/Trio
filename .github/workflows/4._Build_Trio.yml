name: 4. Build Trio
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Trio
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build Unsigned IPA
        run: |
          xcodebuild archive \
            -workspace Trio.xcworkspace \
            -scheme Trio \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Trio.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          
          mkdir -p build/Payload
          cp -r build/Trio.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r Trio_Unsigned.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trio-App
          path: build/Trio_Unsigned.ipa
